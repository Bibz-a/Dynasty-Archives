{% extends "base.html" %}

{% block title %}Login • Dynasty Archives{% endblock %}

{% block content %}
  <section class="auth-container">
    <article class="card" style="width:100%;">
      <div class="card-body">
        <h1 style="text-align: center; margin-bottom: 1rem;">Login</h1>
        <p class="muted">Sign in to access the archive administration panel.</p>
        <hr class="section-rule">
        <form method="post" class="stack">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div>
            <label class="form-label">Username</label>
            <input class="form-control" type="text" name="username" required autocomplete="username">
          </div>
          <div>
            <label class="form-label">Password</label>
            <input class="form-control" type="password" name="password" required autocomplete="current-password">
          </div>
          <button class="btn btn-light" type="submit">Sign in</button>
        </form>
        <div class="auth-divider"><span>or</span></div>
        <button id="google-signin-btn" class="google-signin-btn" type="button" aria-label="Continue with Google">
          <svg viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.5l6.7-6.7C35.6 2.4 30.2 0 24 0 14.6 0 6.5 5.4 2.5 13.3l7.8 6.1C12.1 13.6 17.5 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 2.9-2.2 5.3-4.7 6.9l7.3 5.7c4.3-4 6.7-9.8 6.7-16.6z"/>
            <path fill="#FBBC05" d="M10.3 28.6c-.5-1.4-.8-3-.8-4.6s.3-3.2.8-4.6l-7.8-6.1C.9 16.5 0 20.1 0 24s.9 7.5 2.5 10.7l7.8-6.1z"/>
            <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.3-5.7c-2 1.4-4.7 2.2-7.9 2.2-6.5 0-12-4.1-13.9-9.9l-7.8 6.1C6.5 42.6 14.6 48 24 48z"/>
          </svg>
          Continue with Google
        </button>
      </div>
    </article>
  </section>
  <style>
    .auth-divider { position: relative; margin: 1.2rem 0 1rem; text-align: center; }
    .auth-divider::before { content: ""; position: absolute; left: 0; right: 0; top: 50%; border-top: 1px solid rgba(245,240,232,.18); }
    .auth-divider span { position: relative; z-index: 1; padding: 0 .6rem; background: var(--surface); color: var(--muted); font-size: .85rem; }
    .google-signin-btn {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: .65rem;
      background: #171513; color: #f5f0e8; border: 1px solid rgba(255,255,255,.24);
      border-radius: 10px; padding: .78rem .95rem; transition: border-color .2s ease, transform .15s ease;
    }
    .google-signin-btn:hover { border-color: var(--gold); }
    .google-signin-btn:active { transform: scale(.98); }
    .google-signin-btn svg { width: 20px; height: 20px; flex: 0 0 20px; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script>
    (function () {
      const apiKey = "{{ config.FIREBASE_API_KEY }}";
      const authDomain = "{{ config.FIREBASE_AUTH_DOMAIN }}";
      const projectId = "{{ config.FIREBASE_PROJECT_ID }}";
      if (!apiKey || !authDomain || !projectId) return;
      if (!firebase.apps.length) {
        firebase.initializeApp({ apiKey: apiKey, authDomain: authDomain, projectId: projectId });
      }
      const btn = document.getElementById("google-signin-btn");
      if (!btn) return;
      btn.addEventListener("click", async function () {
        const provider = new firebase.auth.GoogleAuthProvider();
        try {
          const result = await firebase.auth().signInWithPopup(provider);
          const idToken = await result.user.getIdToken();
          const response = await fetch("/auth/google-login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id_token: idToken })
          });
          const data = await response.json();
          if (data.success) {
            window.location.href = data.redirect;
          } else {
            alert(data.error || "Sign-in failed.");
          }
        } catch (err) {
          console.error(err);
          alert("Google sign-in failed: " + (err && err.message ? err.message : "Unknown error"));
        }
      });
    })();
  </script>
{% endblock %}
