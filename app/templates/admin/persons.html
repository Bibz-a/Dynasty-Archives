{% extends "base.html" %}

{% block title %}Manage Persons • Admin{% endblock %}

{% block content %}
  <div class="card">
    <div class="card-body p-4">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
        <h1 class="h4 mb-0">Manage Persons (Rulers)</h1>
        <a class="btn btn-light" href="{{ url_for('admin.person_add') }}">Add Person</a>
      </div>

      <div class="table-responsive mt-3">
        <table class="table table-hover align-middle mb-0">
          <thead>
            <tr>
              <th>Name</th>
              <th>Dynasty</th>
              <th>Birth</th>
              <th>Death</th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody>
            {% for p in persons %}
              <tr>
                <td class="fw-semibold">{{ p[1] }}</td>
                <td class="muted">{{ p[2] }}</td>
                <td>{{ p[3] or '' }}</td>
                <td>{{ p[4] or '' }}</td>
                <td class="text-end">
                  <a class="btn btn-outline-light btn-sm" href="{{ url_for('admin.person_edit', person_id=p[0]) }}">Edit</a>
                  <form method="post" action="{{ url_for('admin.person_delete', person_id=p[0]) }}" class="d-inline">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <button class="btn btn-outline-danger btn-sm" type="submit" onclick="return confirm('Delete person? This will also delete linked reigns (CASCADE).')">Delete</button>
                  </form>
                </td>
              </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
{% endblock %}
